name: Update SW Dev File Trees

on:
  schedule:
    - cron: '0 6 1,15 * *'  # 1st and 15th of each month, 06:00 UTC
  workflow_dispatch:

permissions:
  models: read    # required for GitHub Models API (inference.ai.azure.com)
  contents: write # needed to push the updated README.md + CHANGELOG.md

jobs:
  update-trees:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          tool-bin-dir: "~/.local/bin"

      - name: Install aider-chat (Python 3.12)
        run: uv tool install --force --python python3.12 aider-chat@latest

      - name: Install aider-skills (Python 3.12)
        run: uv tool install --force --python python3.12 aider-skills

      - name: Verify tools on PATH
        run: |
          aider --version
          aider-skills --version

      - name: Reset README.md to clean skeleton
        run: printf '# 25 Most Used File Trees in Software Development\n' > README.md

      - name: Prepare prompt (inject today's date)
        id: prompt
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RAW=$(sed -n '/^```$/,/^```$/{ /^```$/d; p }' skills/list-sw-dev-file-trees-en/references/prompt.md)
          printf '%s' "$(echo "$RAW" | sed "s/{TODAY}/$TODAY/g")" > /tmp/aider_prompt.txt
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Run aider (README.md only)
        env:
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SKILLS_TMPFILE=$(aider-skills tmpfile ./skills)
          aider \
            --read "$SKILLS_TMPFILE" \
            --file README.md \
            --message-file /tmp/aider_prompt.txt \
            --no-suggest-shell-commands

      - name: Update CHANGELOG.md (prepend entry via shell)
        # Shell owns CHANGELOG — reliable, no SEARCH/REPLACE fragility.
        # Detects rank changes by diffing the Name column order before/after.
        run: |
          TODAY=${{ steps.prompt.outputs.today }}

          # Extract current Name column order from the new README
          NEW_RANKS=$(grep '^\| [0-9]' README.md | sed 's/.*\*\*\(.*\)\*\*.*/\1/')

          # Extract previous Name column order from git (last commit of README)
          OLD_RANKS=$(git show HEAD:README.md 2>/dev/null \
            | grep '^\| [0-9]' | sed 's/.*\*\*\(.*\)\*\*.*/\1/' || echo "")

          if [ "$NEW_RANKS" = "$OLD_RANKS" ]; then
            CHANGES="No ranking changes this run."
          else
            CHANGES="Ranking or content updated — diff the commit for details."
          fi

          # Prepend new entry to CHANGELOG.md (temp file swap)
          NEW_ENTRY="## $TODAY\n\n- $CHANGES\n\n---\n\n"
          printf "$NEW_ENTRY" | cat - CHANGELOG.md > /tmp/CHANGELOG.tmp
          mv /tmp/CHANGELOG.tmp CHANGELOG.md

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(auto): refresh file tree list [${{ steps.prompt.outputs.today }}]"
            git push
          fi
