name: Update SW Dev File Trees

on:
  # Bi-weekly: every other Monday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 1/14'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  models: read   # required for GitHub Models API (inference.ai.azure.com)
  contents: write   # needed to push the updated README.md + CHANGELOG.md

jobs:
  update-trees:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # Pin tool binaries to ~/.local/bin which is already on PATH
          # on GitHub-hosted Ubuntu runners — no extra PATH step needed.
          tool-bin-dir: "~/.local/bin"

      - name: Install aider-chat (Python 3.12)
        run: |
          # aider-chat requires Python <3.13 — uv fetches 3.12 automatically.
          # Installs the `aider` executable into ~/.local/bin.
          uv tool install --force --python python3.12 aider-chat@latest

      - name: Install aider-skills (Python 3.12)
        run: |
          # Installed as a separate uv tool so the `aider-skills` executable
          # is independently available on PATH in ~/.local/bin.
          uv tool install --force --python python3.12 aider-skills

      - name: Verify tools on PATH
        run: |
          aider --version
          aider-skills --version

      - name: Prepare prompt (inject today's date)
        id: prompt
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RAW=$(cat skills/list-sw-dev-file-trees-en/references/prompt.md \
                | sed -n '/^```$/,/^```$/{ /^```$/d; p }')
          MSG=$(echo "$RAW" | sed "s/{TODAY}/$TODAY/g")
          printf '%s' "$MSG" > /tmp/aider_prompt.txt
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Run aider
        env:
          # GitHub Models API: use GITHUB_TOKEN as the OpenAI-compatible key
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # aider-skills tmpfile generates the <available_skills> XML covering
          # SKILL.md + all references/ files, written to a temp file.
          # aider reads it as read-only context per the agentskills.io spec.
          SKILLS_TMPFILE=$(aider-skills tmpfile ./skills)

          aider \
            --read "$SKILLS_TMPFILE" \
            --file README.md \
            --file CHANGELOG.md \
            --message-file /tmp/aider_prompt.txt \
            --no-suggest-shell-commands

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(auto): refresh file tree list [${{ steps.prompt.outputs.today }}]"
            git push
          fi
