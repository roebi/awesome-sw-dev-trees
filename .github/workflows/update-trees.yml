name: Update SW Dev File Trees

on:
  # Bi-weekly: every other Monday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 1/14'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to push the updated README.md + CHANGELOG.md

jobs:
  update-trees:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install aider-chat and aider-skills via uv (Python 3.12)
        run: |
          # aider-chat requires Python <3.13 — uv fetches 3.12 automatically.
          # --with aider-skills injects it into the same isolated tool env
          # so both `aider` and `aider-skills` share the same Python.
          uv tool install --force --python python3.12 \
            --with aider-skills \
            aider-chat@latest

      - name: Add uv tool bin to PATH
        # uv tool install puts binaries in its own bin dir which is NOT
        # automatically on $GITHUB_PATH — this step makes `aider` and
        # `aider-skills` available to all subsequent steps.
        run: echo "$(uv tool bin)" >> "$GITHUB_PATH"

      - name: Prepare prompt (inject today's date)
        id: prompt
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RAW=$(cat skills/list-sw-dev-file-trees-en/references/prompt.md \
                | sed -n '/^```$/,/^```$/{ /^```$/d; p }')
          MSG=$(echo "$RAW" | sed "s/{TODAY}/$TODAY/g")
          printf '%s' "$MSG" > /tmp/aider_prompt.txt
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"

      - name: Run aider
        env:
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SKILLS_TMPFILE=$(aider-skills tmpfile ./skills)

          aider \
            --read "$SKILLS_TMPFILE" \
            --file README.md \
            --file CHANGELOG.md \
            --message-file /tmp/aider_prompt.txt \
            --no-suggest-shell-commands

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md CHANGELOG.md

          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "chore(auto): refresh file tree list [${{ steps.prompt.outputs.today }}]"
            git push
          fi
